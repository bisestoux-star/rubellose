<body>
  <main class="page">
    <section class="card-scene" aria-label="Digitales Rubellos">
      <div class="card" id="card">
        <div class="card-face card-front">
          <img src="assets/Rubellos_vorne.svg" alt="Anleitung zum Rubellos" class="card-image" />
          <button id="coinButton" class="coin-button" aria-label="Münze antippen und Karte umdrehen">
            <img src="assets/emblem_coin.svg" alt="Münze" />
          </button>
        </div>

        <div class="card-face card-back">
          <img src="assets/Teamlos.svg" alt="Teamlos" class="card-image" />
          <canvas id="scratchCanvas" aria-label="Herz freirubbeln"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
