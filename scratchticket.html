<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Scratch Ticket</title>

  <!-- WhatsApp / iMessage Vorschau -->
  <meta property="og:title" content="Open Scratch Ticket" />
  <meta property="og:description" content="Tap the Link and open your Scratch Ticket" />
  <meta property="og:image" content="https://bisestoux-star.github.io/rubellos/assets/Vorschau_deutsch.jpg" />
  <meta property="og:image:type" content="image/jpg" />
  <meta property="og:url" content="https://bisestoux-star.github.io/scratchticket/" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Open Scratch Ticket" />
  <meta name="twitter:description" content="Tap the Link and open your Scratch Ticket" />
  <meta name="twitter:image" content="https://bisestoux-star.github.io/rubellos/assets/Vorschau_english.jpg" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card-scene" aria-label="Digitales Rubellos">
      <div class="card" id="card">
        <div class="card-face card-front">
          <img src="assets/Scatch Ticket_front.svg" alt="Instructions" class="card-image" />
          <button id="coinButton" class="coin-button" aria-label="Tap the coin and flip the card">
            <img src="assets/emblem_coin.svg" alt="Münze" />
          </button>
        </div>

        <div class="card-face card-back">
          <img src="assets/Lucky Ticket.svg" alt="Lucky Ticket" class="card-image" />
          <canvas id="scratchCanvas" aria-label="scratch off"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
